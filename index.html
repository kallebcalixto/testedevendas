<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Player Programado — KBS TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { 
    color-scheme: dark; 
    --primary-color: #2e7d32; 
    --error-color: #ff4d4d;
    --gold: #ffd700;
  }
  body {
    background:#000;
    color:#eee;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin:0;
    overflow-y: scroll;
    min-height: 101vh;
    position: relative;
  }

  /* --- MANTENDO TUDO DO LAYOUT ORIGINAL --- */
  .movel { position: absolute !important; cursor: move; z-index: 10; transition: outline 0.2s; }
  .modo-edicao .movel { outline: 2px dashed var(--primary-color); background: rgba(46, 125, 50, 0.05); }
  #btn-trava-layout { position: fixed; bottom: 20px; right: 20px; z-index: 999999; padding: 15px 25px; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; border: 2px solid #fff; cursor: pointer; }
  .layout-destravado { background: #ff4d4d !important; color: #fff; }
  .layout-travado { background: #2e7d32 !important; color: #fff; }

  /* --- OTIMIZAÇÃO PARA CORTE SECO (TV) --- */
  #player {
    width:500px; height:280px; 
    background:#000 !important;
    border:1px solid #333; border-radius:8px;
    object-fit: contain;
    display:block;
  }
  
  /* ESCONDE TUDO NO PLAYER E SÓ MOSTRA SE PASSAR O MOUSE */
  #player::-webkit-media-controls { display: none !important; }
  #player::-webkit-media-controls-enclosure { display: none !important; }
  #player::-webkit-media-controls-panel { display: none !important; }
  #player::-webkit-media-controls-loading-indicator { display: none !important; }
  
  #player:hover::-webkit-media-controls { display: flex !important; }
  #player:hover::-webkit-media-controls-enclosure { display: flex !important; }
  #player:hover::-webkit-media-controls-panel { display: flex !important; }

  /* --- RESTANTE DO SEU LAYOUT ORIGINAL --- */
  #tela-pagamento { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); display: none; justify-content: center; align-items: center; z-index: 100000; backdrop-filter: blur(10px); }
  .painel-premium { background: #161616; padding: 40px; border-radius: 24px; border: 1px solid #333; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
  #tela-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 99999; }
  .card-login { background: #1b1b1b; padding: 40px; border-radius: 12px; border: 1px solid #333; text-align: center; }
  
  .wrap { max-width:1200px; margin:0 auto; padding:20px; }
  .top { display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; justify-content:center; }
  #ytplayer { width:500px; height:280px; background:#000 !important; border:1px solid #333; border-radius:8px; display:none; }
  .controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; background:#2f2f2f; color:#fff; }
  .grid { display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; max-height:400px; overflow-y: auto; }
  .bloco { position:relative; flex:0 0 260px; border:1px solid #2b2b2b; background:#171717; border-radius:10px; padding:12px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
