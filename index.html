<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Player Programado — KBS TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { 
    color-scheme: dark; 
    --primary-color: #2e7d32; 
    --error-color: #ff4d4d;
    --gold: #ffd700;
  }
  body {
    background:#000;
    color:#eee;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin:0;
    overflow: auto !important; 
    min-width: 100vw;
    min-height: 101vh;
    position: relative;
  }

  /* --- NOVOS ESTILOS PARA MOVIMENTAÇÃO --- */
  .movel {
    position: absolute !important;
    cursor: move;
    z-index: 10;
    transition: outline 0.2s;
  }
  .modo-edicao .movel {
    outline: 2px dashed var(--primary-color);
    background: rgba(46, 125, 50, 0.05);
  }
  #btn-trava-layout {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999999;
    padding: 15px 25px;
    border-radius: 50px;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
    border: 2px solid #fff;
    cursor: pointer;
  }
  .layout-destravado { background: #ff4d4d !important; color: #fff; }
  .layout-travado { background: #2e7d32 !important; color: #fff; }
  /* -------------------------------------- */

  #tela-pagamento {
    position: fixed; 
    top: 0; left: 0; 
    width: 100%; height: 100%; 
    background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
    display: none; 
    justify-content: center; 
    align-items: center; 
    z-index: 100000;
    backdrop-filter: blur(10px);
  }

  .painel-premium {
    background: #161616;
    padding: 40px;
    border-radius: 24px;
    border: 1px solid #333;
    width: 100%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;
  }

  .painel-premium::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 4px;
    background: linear-gradient(90deg, transparent, var(--error-color), transparent);
  }

  .status-badge {
    background: var(--error-color);
    color: white;
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 20px;
  }

  .painel-premium h2 {
    font-size: 32px;
    margin: 10px 0;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
  }

  .painel-premium p {
    color: #aaa;
    margin-bottom: 30px;
    font-size: 15px;
  }

  .btn-plano-premium {
    width: 100%;
    padding: 20px;
    margin: 12px 0;
    background: linear-gradient(145deg, #1e1e1e, #141414);
    border: 1px solid #333;
    color: #fff;
    border-radius: 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-plano-premium:hover {
    border-color: var(--primary-color);
    transform: translateY(-2px);
    background: #1f1f1f;
    box-shadow: 0 5px 15px rgba(46, 125, 50, 0.2);
  }

  .btn-plano-premium .nome {
    font-weight: bold;
    font-size: 16px;
    text-transform: uppercase;
  }

  .btn-plano-premium .preco {
    color: var(--primary-color);
    font-weight: 900;
    font-size: 18px;
  }

  .btn-plano-premium.destaque {
    border-color: var(--gold);
  }
  .btn-plano-premium.destaque .preco {
    color: var(--gold);
  }

  #qrcode-container {
    margin-top: 25px;
    background: #000;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #tela-login {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; display: flex; justify-content: center; align-items: center; z-index: 99999;
  }
  .card-login {
    background: #1b1b1b; padding: 40px 30px; border-radius: 12px;
    border: 1px solid #333; width: 340px; text-align: center;
  }
  .card-login h2 { margin-bottom: 10px; color: #2e7d32; font-weight: 900; }
  .card-login p { color: #888; font-size: 14px; margin-bottom: 25px; }

  header { padding:16px 20px; background:#1b1b1b; border-top:1px solid #2a2a2a; }
  header h1 { margin:0 0 6px 0; font-size:18px; }
  #grade { white-space:pre-line; font-size:13px; color:#ddd; max-height:220px; overflow-y:auto; }
  .wrap { max-width:1200px; margin:0 auto; padding:20px; }
  .top { display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; justify-content:center; }

  #player, #ytplayer { 
    width:500px; height:280px; 
    background:#000 !important;
    border:1px solid #333; border-radius:8px; 
    transition: opacity 0.15s ease-in-out;
  }

  video::-webkit-media-controls-start-playback-button { display: none !important; }
  video::-internal-media-controls-loading-indicator { display: none !important; }
  video::-webkit-media-controls-panel { background-color: rgba(0,0,0,0.5) !important; }

  #player { object-fit: contain; display:block; }
  #ytplayer { display:none; }
  .controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; background:#2f2f2f; color:#fff; }
  button:hover { background:#454545; }
  .btn-pri { background:#2e7d32; } .btn-pri:hover{ background:#3e8d42; }
  .btn-sec { background:#1976d2; } .btn-sec:hover{ background:#2a82d8; }
  .btn-admin { background:#6200ee; font-weight: bold; } .btn-admin:hover { background:#7c4dff; }
   
  .grid { 
    display:flex; 
    flex-wrap:wrap; 
    gap:12px; 
    margin-top:18px; 
    max-height:400px; 
    overflow-y: auto !important; 
    overflow-x: hidden;
    padding-right: 10px;
    width: auto;
    max-width: 90vw;
  }
   
  .bloco { position:relative; flex:0 0 260px; border:1px solid #2b2b2b; background:#171717; border-radius:10px; padding:12px; }
  .bloco h3 { margin:0 0 10px 0; font-size:15px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .row input[type="time"] { width:130px; }
  .hint { font-size:12px; color:#aaa; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; background:#2a2a2a; font-size:12px; margin-left:6px; }
  .running::before {
    content:"Em execução"; position:absolute; top:0; left:0; right:0;
    background:#2e7d32; color:#fff; font-size:12px; text-align:center;
    padding:2px 0; border-radius:10px 10px 0 0;
  }
  .mini-btn { padding:4px 6px; margin:2px; border:none; border-radius:6px; cursor:pointer; background:#444; color:#fff; font-size:12px; }
  .mini-btn:hover { background:#666; }

  #letreiro-kbs-auto {
    position: absolute; top: 20px; left: 20px; z-index: 999;
    background: transparent; color: #ffd700; border-left: 5px solid #ffd700;
    padding: 10px 20px; font-weight: bold; font-size: 14px;
    display: none; align-items: center; gap: 10px; border-radius: 0 8px 8px 0;
    text-shadow: 2px 2px 4px #000; 
    cursor: move;
    user-select: none;
  }
  #letreiro-logo-img { height: 25px; width: auto; display: none; pointer-events: none; }
  #letreiro-texto-arquivo { pointer-events: none; }

  #banner-somente-logo {
    position: absolute; 
    top: 60px; 
    left: 20px; 
    z-index: 1001;
    cursor: move;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    resize: both; 
    width: 80px;   
    height: 80px; 
    min-width: 20px;
    min-height: 20px;
  }
  #img-banner-fixo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    display: none;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzzQg4fMWQm82aOu2xM2huVPvHeyitFxQ",
    authDomain: "controle-remoto-da345.firebaseapp.com",
    databaseURL: "https://controle-remoto-da345-default-rtdb.firebaseio.com",
    projectId: "controle-remoto-da345",
    storageBucket: "controle-remoto-da345.firebasestorage.app",
    messagingSenderId: "246457543992",
    appId: "1:246457543992:web:41bf1bd64a4788fb2625cd",
    measurementId: "G-CFHSFG82SX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });

  window.fazerLoginGoogle = () => {
    signInWithPopup(auth, provider)
      .then((result) => {
        if (result && result.user) {
          const user = result.user;
          document.getElementById('tela-login').style.display = 'none';
          
          const playerRef = ref(db, `usuarios/${user.uid}/player_m3u/0`);
          get(playerRef).then((snapshot) => {
            if (!snapshot.exists()) {
              set(playerRef, {
                dia: "segunda", inicio: "12:00", fim: "13:00",
                m3u: "https://srv4.zcast.com.br/samircalixto/samircalixto/playlist.m3u8",
                yt: "", timestamp: Date.now()
              });
            }
          });
        }
      })
      .catch(err => {
        console.error(err);
        alert("Erro ao conectar com Google. Verifique os bloqueadores ou permissões do seu navegador.");
      });
  };

  window.ativarTeste7Dias = () => {
    const user = auth.currentUser;
    if (!user) return;

    const configRef = ref(db, `usuarios/${user.uid}/config`);
    get(configRef).then((snapshot) => {
      const config = snapshot.val() || {};
      if (config.testeUtilizado) {
        alert("Desculpe, este e-mail já utilizou o período de 7 dias de teste grátis.");
        return;
      }

      const seteDiasEmMilisegundos = Date.now() + (7 * 24 * 60 * 60 * 1000);
      
      set(configRef, {
        expiracao: seteDiasEmMilisegundos,
        testeUtilizado: true
      }).then(() => {
        alert("Teste de 7 dias ativado com sucesso! Aproveite o seu player.");
      }).catch(err => alert("Erro ao ativar teste: " + err.message));
    });
  };

  window.fazerLogout = () => {
    signOut(auth).then(() => { location.reload(); }).catch(err => alert("Erro ao sair: " + err.message));
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('tela-login').style.display = 'none';
      onValue(ref(db, `usuarios/${user.uid}/config`), snap => {
        const config = snap.val() || { expiracao: 0, testeUtilizado: false };
        const agora = Date.now();
        
        const btnTeste = document.getElementById('btn-teste-7dias');
        if (config.testeUtilizado) {
          if (btnTeste) btnTeste.style.display = 'none';
        } else {
          if (btnTeste) btnTeste.style.display = 'flex';
        }

        if (config.expiracao < agora) {
          document.getElementById('tela-pagamento').style.display = 'flex';
          document.getElementById('conteudo-player').style.display = 'none';
        } else {
          document.getElementById('tela-pagamento').style.display = 'none';
          document.getElementById('conteudo-player').style.display = 'block';
          const blocosRef = ref(db, `usuarios/${user.uid}/player_m3u`);
          iniciarLeituraFirebase(blocosRef);
        }
      });
    } else {
      document.getElementById('tela-login').style.display = 'flex';
      document.getElementById('conteudo-player').style.display = 'none';
      document.getElementById('tela-pagamento').style.display = 'none';
    }
  });

  window.gerarPix = async (valorPlano) => {
    const container = document.getElementById('qrcode-container');
    container.innerHTML = "<p>Gerando código PIX seguro...</p>";
    try {
      const res = await fetch("https://kbs-backend-k3d0.onrender.com/gerar-pix", {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: auth.currentUser.email, uid: auth.currentUser.uid, valor: valorPlano })
      });
      const data = await res.json();
      if(data.qr_code_base64) {
        container.innerHTML = `
          <img src="data:image/png;base64,${data.qr_code_base64}" style="width:180px; background:white; padding:10px; border-radius:12px; box-shadow: 0 0 20px rgba(255,255,255,0.1);">
          <div style="margin-top:10px; font-size:11px; color:#2e7d32; font-weight:bold;">CÓDIGO COPIA E COLA:</div>
          <div style="font-size:10px; color:#888; word-break:break-all; background:#111; padding:8px; border:1px solid #333; width:100%; box-sizing:border-box;">${data.qr_code}</div>
          <button onclick="navigator.clipboard.writeText('${data.qr_code}').then(()=>alert('Copiado!'))" style="margin-top:5px; background:#333; font-size:11px;">Copiar Código</button>
        `;
      }
    } catch (e) { alert("Erro ao conectar com servidor."); container.innerHTML = ""; }
  };

  window._firebase_db = db;
  window._firebase_ref = ref;
  window._firebase_set = set;
  window._firebase_onValue = onValue;

  window.iniciarLeituraFirebase = function(referenciaDinamica) {
      window._firebase_onValue(referenciaDinamica, snap => {
          const dadosFirebase = snap.val() || {};
          
          let blocosManter = blocos.filter(b => b.tipo !== 'youtube' && !b._firebaseIndex);
          let novosBlocosAgendados = [];

          Object.keys(dadosFirebase).forEach(i => {
              const d = dadosFirebase[i];
              novosBlocosAgendados.push({
                  tipo: 'youtube', 
                  arquivos: [], 
                  progresso: [],
                  tempo: 0, 
                  sessaoRestante: 0, 
                  pauseRestante: 0,
                  arquivoAtual: 0, 
                  limitePorCiclo: 0,
                  ytlink: d.yt || '', 
                  m3ulink: d.m3u || '', 
                  diaSemana: d.dia || '', 
                  horaInicio: d.inicio || '', 
                  horaFim: d.fim || '',
                  removido: false, 
                  _agendadoRodando: false, 
                  _firebaseIndex: i 
              });
          });

          blocos = [...blocosManter, ...novosBlocosAgendados];
          
          blocosEl.innerHTML = '';
          blocos.forEach((b, i) => renderizarBloco(i, b));
          atualizarGrade();
          
          if (idxBloco >= blocos.length) idxBloco = 0;
      });
  };
</script>
</head>

<body>
  <div id="tela-pagamento">
    <div class="painel-premium">
      <div class="status-badge">Sinal Interrompido</div>
      <h2>Acesso Expirado</h2>
      <p>Sua licença KBS TV chegou ao fim. Selecione um plano abaixo ou ative seu teste gratuito para liberar o player:</p>
      
      <button id="btn-teste-7dias" class="btn-plano-premium destaque" onclick="ativarTeste7Dias()" style="background: linear-gradient(145deg, #1b5e20, #2e7d32); border-color: var(--gold);">
        <span class="nome">🎁 Ativar 7 Dias de Teste</span>
        <span class="preco">GRÁTIS</span>
      </button>

      <button class="btn-plano-premium" onclick="gerarPix(29.90)">
        <span class="nome">Plano Mensal</span>
        <span class="preco">R$ 29,90</span>
      </button>

      <button class="btn-plano-premium destaque" onclick="gerarPix(230.90)">
        <span class="nome">Plano Semestral 🌟</span>
        <span class="preco">R$ 230,90</span>
      </button>

      <button class="btn-plano-premium" onclick="gerarPix(1.00)">
        <span class="nome">Plano Anual</span>
        <span class="preco">R$ 349,90</span>
      </button>

      <div id="qrcode-container"></div>
      
      <button onclick="fazerLogout()" style="background:none; border:none; color:#555; text-decoration:underline; cursor:pointer; margin-top:20px; font-size:13px;">Alternar conta de usuário</button>
    </div>
  </div>

  <div id="tela-login">
    <div class="card-login">
      <h2>KBS TV</h2>
      <p>Área de Acesso do Cliente</p>
      
      <button onclick="fazerLoginGoogle()" style="background:#db4437; padding: 16px; font-size: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; border-radius: 8px; box-shadow: 0 4px 12px rgba(219,68,55,0.2); transition: all 0.2s; cursor: pointer; border: none; color: white;">
        <svg style="width:20px; height:20px; fill:white;" viewBox="0 0 24 24"><path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.133 1 1.18 5.925 1.18 12s4.953 11 11.06 11c6.373 0 10.596-4.477 10.596-10.75 0-.725-.078-1.275-.173-1.615H12.24z"/></svg>
        ENTRAR COM O GMAIL
      </button>
    </div>
  </div>

  <div id="conteudo-player" style="display:none;">
    <div class="wrap">
      
      <div class="movel" style="top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10000;">
          <button class="btn-admin" onclick="window.open('admin.html', '_blank')">⚙️ ABRIR ADMIN</button>
          <button onclick="fazerLogout()" style="background:#b71c1c; font-weight: bold;">🚪 SAIR</button>
      </div>

      <div class="top">
        <div class="movel" style="left: 20px; top: 100px; z-index: 5000 !important;">
          
          <div id="letreiro-kbs-auto" onmousedown="startDrag(event)">
            <img id="letreiro-logo-img" src="">
            <span id="letreiro-texto-arquivo"></span>
          </div>

          <div id="banner-somente-logo" onmousedown="startDrag(event)">
            <img id="img-banner-fixo" src="">
          </div>

          <video id="player" controls playsinline></video>
          <iframe id="ytplayer" allow="autoplay; encrypted-media" frameborder="0"></iframe>
          
          <div class="controls">
            <button class="btn-pri" onclick="iniciar()">▶ Iniciar</button>
            <button onclick="pausar()">⏸ Pausar</button>
            <button onclick="retomar()">⏵ Retomar</button>
            <button onclick="blocoAnterior()">⏮ Bloco anterior</button>
            <button onclick="proximoBloco()">⏭ Próximo bloco</button>
          </div>

          <div class="player-resize-controls" style="margin-top:10px; display:flex; gap:8px; align-items:center;">
            <label>Largura:</label>
            <input type="number" id="playerWidth" value="500" style="width:70px;">
            <label>Altura:</label>
            <input type="number" id="playerHeight" value="280" style="width:70px;">
            <button onclick="resizePlayer()">Redimensionar</button>
          </div>
        </div>

        <div class="movel" style="left: 550px; top: 100px;">
          <div style="background:#1a1a1a; padding:15px; border-radius:10px; border:1px solid #333; width: 300px;">
              <label style="font-size:11px; color:#2e7d32; font-weight:bold;">URL DO BRIDGE (NODE.JS):</label>
              <input type="text" id="bridgeUrl" value="ws://localhost:8080" style="width:100%; background:#000; border:1px solid #444; color:#fff; padding:8px; margin:5px 0; border-radius:5px;">
              <div style="display:flex; gap:10px; align-items:center;">
                <button id="btnStream" onclick="toggleStream()" style="background:#b71c1c; flex:1; font-weight:bold;">🔴 INICIAR TRANSMISSÃO</button>
                <div id="statusLed" style="width:12px; height:12px; background:#444; border-radius:50%;"></div>
              </div>
          </div>

          <div style="margin-top:15px; display: flex; flex-direction: column; gap: 5px; width: 330px;">

            <button class="btn-sec" onclick="adicionarBloco('movie')">+ Bloco (Filmes)</button>
            <button class="btn-sec" onclick="adicionarBloco('pause')">+ Bloco (Pausa)</button>
            <button class="btn-sec" onclick="salvarProgramacao()">💾 Salvar Programação</button>
            <button class="btn-sec" onclick="carregarProgramacao()">📂 Carregar Programação</button>

          <div style="margin-top:15px; background:#222; padding:15px; border-radius:8px; border:1px solid #333; width: 300px;">
            <label style="font-size:11px; color:#ffd700; display:block; margin-bottom:5px; font-weight:bold;">CONFIGURAÇÃO DE BANNERS:</label>
            <div style="margin-bottom:10px;">
              <label style="font-size:10px; display:block; color:#aaa;">LINK DA LOGO (BANNER FIXO):</label>
              <input type="text" id="logoUrl" oninput="atualizarLogos(this.value)" placeholder="Cole o link da imagem .png aqui" style="width:100%; background:#000; border:1px solid #444; color:#fff; font-size:12px; padding:8px; border-radius:5px;">
            </div>
          </div>
        </div>
      </div>

      <div id="blocos" class="grid movel" style="top: 450px; left: 20px;"></div>
    </div>

    <header class="movel" style="bottom: 80px; left: 20px; width: 90%;">
      <h1>📺 Grade de Programação</h1>
      <div id="grade">Carregando programação do administrador...</div>
    </header>
  </div>

<script>
const video = document.getElementById('player');
const ytplayer = document.getElementById('ytplayer');
const gradeEl = document.getElementById('grade');
const blocosEl = document.getElementById('blocos');
let blocos = [];
let idxBloco = 0;
let timeupdateHandler = null;
let pauseTimer = null;
let blocoAnteriorIdx = -1;
let blocoAnteriorProgresso = 0;
let blocoAnteriorPaused = false;
let hlsInstance = null;
let sistemaIniciado = false;

function atualizarLogos(url) {
  const logo1 = document.getElementById('letreiro-logo-img');
  const logo2 = document.getElementById('img-banner-fixo');
  if(url) {
    logo1.src = url;
    logo1.style.display = 'block';
    logo2.src = url;
    logo2.style.display = 'block';
  } else {
    logo1.style.display = 'none';
    logo2.style.display = 'none';
  }
}

function gerenciarBannerKBS() {
  const b = blocos[idxBloco];
  if (b && b.arquivos && b.arquivos[b.arquivoAtual]) {
    const banner = document.getElementById('letreiro-kbs-auto');
    const nomeBruto = b.arquivos[b.arquivoAtual].name;
    if(!nomeBruto) return;
    let nomeLimpo = nomeBruto.split(/DUBLADO|convertido|DVDRip|XviD|_00|1080p|720p/i)[0].replace(/^[\s.]+/, "").trim();
    if(nomeLimpo.endsWith('.')) nomeLimpo = nomeLimpo.slice(0, -1);
    document.getElementById('letreiro-texto-arquivo').innerText = "EXIBINDO: " + nomeLimpo;
    const urlLogo = document.getElementById('logoUrl').value;
    atualizarLogos(urlLogo);
    banner.style.display = 'flex';
    setTimeout(() => { banner.style.display = 'none'; }, 20000);
  }
}
setInterval(gerenciarBannerKBS, 180000);

function fmt(s){
  s=Math.max(0,Math.floor(s||0));
  const h=String(Math.floor(s/3600)).padStart(2,'0');
  const m=String(Math.floor((s%3600)/60)).padStart(2,'0');
  const ss=String(s%60).padStart(2,'0');
  return `${h}:${m}:${ss}`;
}

function timeToSec(str){
  if(!str) return 0;
  const p=str.split(':').map(Number);
  if(p.length === 3) return p[0]*3600 + p[1]*60 + p[2];
  return (p[0]||0)*3600+(p[1]||0)*60;
}

function anyPlayableBlocks(){
  return blocos.some(b=>b && !b.removido);
}

window.adicionarBloco = function(tipo){
  if (tipo === 'youtube') return alert('Blocos YouTube / M3U são gerenciados apenas pelo painel Admin.');
  const bloco = {
    tipo, arquivos: [], progresso: [],
    tempo: (tipo==='timer'||tipo==='pause'?300:0),
    sessaoRestante: 0, pauseRestante: 0, arquivoAtual: 0,
    limitePorCiclo: (tipo==='movie'?3:0),
    ytlink:'', m3ulink:'', diaSemana:'', horaInicio:'', horaFim:'',
    removido:false, _agendadoRodando:false, diasSelecionados: [], horarios: []
  };
  const i = blocos.push(bloco)-1;
  renderizarBloco(i, bloco);
  atualizarGrade();
}

function renderizarBloco(i, bloco){
  const card = document.createElement('div');
  card.className='bloco';
  card.id=`bloco-${i}`;
  const isTimer = bloco.tipo === 'timer';
  const isYoutubeM3U = bloco.tipo === 'youtube';
  
  if(isYoutubeM3U) return; // Escondido da grade local

  card.innerHTML = `
    <h3>${bloco.tipo === 'movie' ? '🎬 Bloco Filmes' : bloco.tipo === 'pause' ? '⏸ Bloco Pausa' : '⏱ Tempo Fixo'}</h3>
    <div style="margin-bottom:8px;">
      <label>Carregar Vídeos (.mp4):</label>
      <input type="file" multiple accept="video/mp4" onchange="carregarVideosBloco(${i}, this.files)" webkitdirectory style="width:100%; font-size:12px;">
      <div id="count-${i}" class="hint" style="margin-top:4px;">0 vídeos carregados</div>
    </div>
    ${isTimer ? `
      <div class="row">
        <label>Duração:</label>
        <input type="text" value="${fmt(bloco.tempo)}" placeholder="00:00:00" onchange="alterarTempoBloco(${i}, this.value)" style="width:80px; background:#000; text-align:center; color:#fff; border:1px solid #444; padding:4px; border-radius:4px;">
      </div>
    ` : ''}
    ${bloco.tipo === 'movie' ? `
      <div class="row">
        <label>Vídeos por ciclo:</label>
        <input type="number" value="${bloco.limitePorCiclo || 3}" onchange="blocos(${i}).limitePorCiclo = parseInt(this.value); atualizarGrade();" style="width:50px; background:#000; color:#fff; border:1px solid #444; padding:4px; border-radius:4px;">
      </div>
    ` : ''}
    <div style="margin-top:10px; display:flex; justify-content:space-between;">
      <button class="mini-btn" onclick="removerBloco(${i})" style="background:#b71c1c;">Excluir</button>
    </div>
  `;
  blocosEl.appendChild(card);
  document.getElementById(`count-${i}`).innerText = `${bloco.arquivos.length} vídeos carregados`;
}

window.carregarVideosBloco = function(i, files){
  const arr = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.mp4'));
  blocos[i].arquivos = arr;
  blocos[i].progresso = new Array(arr.length).fill(0);
  blocos[i].arquivoAtual = 0;
  document.getElementById(`count-${i}`).innerText = `${arr.length} vídeos carregados`;
  atualizarGrade();
};

window.alterarTempoBloco = function(i, val) {
  blocos[i].tempo = timeToSec(val);
  atualizarGrade();
};

window.removerBloco = function(i){
  blocos[i].removido = true;
  document.getElementById(`bloco-${i}`).remove();
  atualizarGrade();
};

function atualizarGrade(){
  gradeEl.innerHTML = '';
  let txt = '';
  blocos.forEach((b,i)=>{
    if(b.removido) return;
    if(b.tipo === 'youtube') {
      txt += `🔹 [ADMIN AGENDADO] Início: ${b.horaInicio} | Fim: ${b.horaFim} (Link: ${b.ytlink || b.m3ulink})\n`;
    } else {
      txt += `🔸 Bloco ${i} [${b.tipo.toUpperCase()}] - ${b.arquivos.length} vídeos carregados`;
      if(b.tipo==='timer') txt += ` | Duração Fixa: ${fmt(b.tempo)}`;
      txt += '\n';
    }
  });
  gradeEl.innerHTML = txt || 'Nenhum bloco configurado na grade local.';
}

function tocarElemento() {
  if(!anyPlayableBlocks()) return;
  
  const b = blocos[idxBloco];
  
  if(!b || b.removido) {
    proximoBloco();
    return;
  }

  if (b.tipo === 'youtube') {
    destruirHls();
    video.style.display = 'none';
    ytplayer.style.display = 'block';
    
    if(b.m3ulink) {
      ytplayer.style.display = 'none';
      video.style.display = 'block';
      if (Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(b.m3ulink);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = b.m3ulink;
        video.play().catch(()=>{});
      }
    } else {
      let embed = b.ytlink;
      if(embed.includes('watch?v=')) embed = embed.split('v=')[1].split('&')[0];
      ytplayer.src = `https://www.youtube.com/embed/${embed}?autoplay=1&controls=1`;
    }
    
    document.querySelectorAll('.bloco').forEach(el=>el.classList.remove('running'));
    return;
  }

  if (b.arquivos.length === 0) {
    proximoBloco();
    return;
  }

  destruirHls();
  ytplayer.style.display = 'none';
  video.style.display = 'block';

  const file = b.arquivos[b.arquivoAtual];
  video.src = URL.createObjectURL(file);
  video.currentTime = b.progresso[b.arquivoAtual] || 0;
  
  document.querySelectorAll('.bloco').forEach(el=>el.classList.remove('running'));
  const card = document.getElementById(`bloco-${idxBloco}`);
  if(card) card.classList.add('running');

  video.play().then(() => {
    gerenciarBannerKBS();
  }).catch(err => {
    console.log("Aguardando interação inicial...");
  });

  if(b.tipo === 'timer' && b.sessaoRestante <= 0) {
    b.sessaoRestante = b.tempo;
  }

  if(timeupdateHandler) video.removeEventListener('timeupdate', timeupdateHandler);
  
  timeupdateHandler = () => {
    b.progresso[b.arquivoAtual] = video.currentTime;
    
    if(b.tipo === 'timer') {
      b.sessaoRestante -= 0.25; 
      if(b.sessaoRestante <= 0) {
        b.sessaoRestante = 0;
        proximoBloco();
      }
    }
  };
  
  video.addEventListener('timeupdate', timeupdateHandler);
  video.onended = () => {
    b.progresso[b.arquivoAtual] = 0;
    b.arquivoAtual = (b.arquivoAtual + 1) % b.arquivos.length;
    tocarElemento();
  };
}

function destruirHls() {
  if(hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }
}

window.iniciar = function() {
  sistemaIniciado = true;
  tocarElemento();
};
window.pausar = function() { video.pause(); };
window.retomar = function() { video.play().catch(()=>{}); };

window.proximoBloco = function() {
  if(blocos.length === 0) return;
  idxBloco = (idxBloco + 1) % blocos.length;
  tocarElemento();
};

window.blocoAnterior = function() {
  if(blocos.length === 0) return;
  idxBloco = (idxBloco - 1 + blocos.length) % blocos.length;
  tocarElemento();
};

setInterval(() => {
  if(!sistemaIniciado) return;

  const agora = new Date();
  const diaSemanaAtual = ["domingo","segunda","terca","quarta","quinta","sexta","sabado"][agora.getDay()];
  const horaMinAtual = `${String(agora.getHours()).padStart(2,'0')}:${String(agora.getMinutes()).padStart(2,'0')}`;

  let blocoAgendadoParaRodar = -1;

  blocos.forEach((b, idx) => {
    if(b.tipo === 'youtube' && b.diaSemana === diaSemanaAtual) {
      if(horaMinAtual >= b.horaInicio && horaMinAtual < b.horaFim) {
        blocoAgendadoParaRodar = idx;
      }
    }
  });

  if(blocoAgendadoParaRodar !== -1) {
    if(idxBloco !== blocoAgendadoParaRodar) {
      if(blocos[idxBloco].tipo !== 'youtube') {
        blocoAnteriorIdx = idxBloco;
        blocoAnteriorProgresso = video.currentTime;
        blocoAnteriorPaused = video.paused;
      }
      idxBloco = blocoAgendadoParaRodar;
      tocarElemento();
    }
  } else {
    if(blocos[idxBloco] && blocos[idxBloco].tipo === 'youtube') {
      if(blocoAnteriorIdx !== -1 && blocos[blocoAnteriorIdx] && !blocos[blocoAnteriorIdx].removido) {
        idxBloco = blocoAnteriorIdx;
        blocoAnteriorIdx = -1;
        tocarElemento();
        video.currentTime = blocoAnteriorProgresso;
        if(blocoAnteriorPaused) video.pause();
      } else {
        proximoBloco();
      }
    }
  }
}, 5000);

window.salvarProgramacao = function() {
  const localBlocos = blocos.filter(b => b.tipo !== 'youtube');
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(localBlocos));
  const downloadAnchor = document.createElement('a');
  downloadAnchor.setAttribute("href", dataStr);
  downloadAnchor.setAttribute("download", "programacao_kbs.json");
  document.body.appendChild(downloadAnchor);
  downloadAnchor.click();
  downloadAnchor.remove();
};

window.carregarProgramacao = function() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = event => {
      const salvos = JSON.parse(event.target.result);
      let blocosAgendadosAtuais = blocos.filter(b => b.tipo === 'youtube');
      blocos = [...salvos, ...blocosAgendadosAtuais];
      blocosEl.innerHTML = '';
      blocos.forEach((b, i) => renderizarBloco(i, b));
      atualizarGrade();
    };
    reader.readAsText(file);
  };
  input.click();
};

let layoutTravado = true;
window.toggleTravaLayout = function() {
  layoutTravado = !layoutTravado;
  const btnTrava = document.getElementById('btn-trava-layout');
  if (layoutTravado) {
    btnTrava.innerHTML = '🔒 Layout Travado';
    btnTrava.className = 'layout-travado';
    document.body.classList.remove('modo-edicao');
  } else {
    btnTrava.innerHTML = '🔓 Layout Livre';
    btnTrava.className = 'layout-destravado';
    document.body.classList.add('modo-edicao');
  }
};

document.addEventListener('mousedown', (e) => {
  if (layoutTravado) return;
  const target = e.target.closest('.movel');
  if (!target) return;
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  let shiftX = e.clientX - target.getBoundingClientRect().left;
  let shiftY = e.clientY - target.getBoundingClientRect().top;

  function moveAt(pageX, pageY) {
    target.style.left = pageX - shiftX + 'px';
    target.style.top = pageY - shiftY + 'px';
  }
  function onMouseMove(event) { moveAt(event.pageX, event.pageY); }
  document.addEventListener('mousemove', onMouseMove);
  document.onmouseup = function() {
    document.removeEventListener('mousemove', onMouseMove);
    document.onmouseup = null;
  };
});
document.addEventListener('dragstart', (e) => { if (e.target.closest('.movel')) e.preventDefault(); });
</script>

<script>
  const player = document.getElementById('player');
  
  function limparPlayer() {
    if (player) {
      player.pause();
      player.removeAttribute('src');
      player.load();
    }
  }

  function resizePlayer() {
    const width = document.getElementById('playerWidth').value;
    const height = document.getElementById('playerHeight').value;
    const player = document.getElementById('player');
    const ytplayer = document.getElementById('ytplayer');
    
    if (player) {
      player.style.width = width + 'px';
      player.style.height = height + 'px';
    }
    if (ytplayer) {
      ytplayer.style.width = width + 'px';
      ytplayer.style.height = height + 'px';
    }
  }

  let socket = null;
  let mediaRecorder = null;
  let streamInterval = null;

  function toggleStream() {
    const btn = document.getElementById('btnStream');
    const led = document.getElementById('statusLed');
    
    if (socket && socket.readyState === WebSocket.OPEN) {
      pararTransmissao();
      btn.innerText = '🔴 INICIAR TRANSMISSÃO';
      btn.style.background = '#b71c1c';
      led.style.background = '#444';
    } else {
      iniciarTransmissao();
    }
  }

  function iniciarTransmissao() {
    const btn = document.getElementById('btnStream');
    const led = document.getElementById('statusLed');
    const bridgeUrl = document.getElementById('bridgeUrl').value;

    console.log('Conectando ao Bridge OBS em:', bridgeUrl);
    socket = new WebSocket(bridgeUrl);

    socket.onopen = () => {
      console.log('Conectado ao Bridge com sucesso!');
      btn.innerText = '⏹️ PARAR TRANSMISSÃO';
      btn.style.background = '#2e7d32';
      led.style.background = '#00ff00';
      capturarEEnviar();
    };

    socket.onclose = () => {
      console.log('Conexão encerrada com o Bridge.');
      pararTransmissao();
      btn.innerText = '🔴 INICIAR TRANSMISSÃO';
      btn.style.background = '#b71c1c';
      led.style.background = '#444';
    };

    socket.onerror = (err) => {
      console.error('Erro no WebSocket:', err);
      alert('Não foi possível conectar ao Bridge. Certifique-se de que o Node.js está rodando localmente.');
      pararTransmissao();
    };
  }

  function capturarEEnviar() {
    const stream = player.captureStream ? player.captureStream(30) : player.mozCaptureStream ? player.mozCaptureStream(30) : null;
    
    if (!stream) {
      alert('Seu navegador não suporta captura de fluxo de vídeo.');
      return;
    }

    const options = { mimeType: 'video/webm; codecs=vp8,opus' };
    mediaRecorder = new MediaRecorder(stream, options);

    mediaRecorder.ondataavailable = (event) => {
      if (event.data && event.data.size > 0 && socket.readyState === WebSocket.OPEN) {
        socket.send(event.data);
      }
    };

    mediaRecorder.start(100); 
  }

  function pararTransmissao() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    if (socket) {
      socket.close();
    }
    mediaRecorder = null;
    socket = null;
  }
</script>
