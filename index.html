<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Player Programado — KBS TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { 
    color-scheme: dark; 
    --primary-color: #2e7d32; 
    --error-color: #ff4d4d;
    --gold: #ffd700;
  }
  body {
    background:#000;
    color:#eee;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin:0;
    overflow: auto !important; 
    min-width: 100vw;
    min-height: 101vh;
    position: relative;
  }

  /* --- ADICIONADO PARA REMOVER CARREGAMENTO E INTERAÇÃO --- */
  #player { 
    object-fit: contain; 
    display:block; 
    pointer-events: none; /* Impede cliques e ícones de carregamento */
  }
  
  video::-webkit-media-controls,
  video::-webkit-media-controls-enclosure,
  video::-webkit-media-controls-panel,
  video::-webkit-media-controls-loading-indicator,
  video::-webkit-media-controls-start-playback-button {
    display: none !important;
  }
  /* ------------------------------------------------------- */

  .movel {
    position: absolute !important;
    cursor: move;
    z-index: 10;
    transition: outline 0.2s;
  }
  .modo-edicao .movel {
    outline: 2px dashed var(--primary-color);
    background: rgba(46, 125, 50, 0.05);
  }
  #btn-trava-layout {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999999;
    padding: 15px 25px;
    border-radius: 50px;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
    border: 2px solid #fff;
    cursor: pointer;
  }
  .layout-destravado { background: #ff4d4d !important; color: #fff; }
  .layout-travado { background: #2e7d32 !important; color: #fff; }

  #tela-pagamento {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
    display: none; justify-content: center; align-items: center; z-index: 100000;
    backdrop-filter: blur(10px);
  }
  .painel-premium { background: #161616; padding: 40px; border-radius: 24px; border: 1px solid #333; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; }
  .painel-premium::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, var(--error-color), transparent); }
  .status-badge { background: var(--error-color); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; display: inline-block; margin-bottom: 20px; }
  .painel-premium h2 { font-size: 32px; margin: 10px 0; font-weight: 900; color: #fff; letter-spacing: -1px; }
  .btn-plano-premium { width: 100%; padding: 20px; margin: 12px 0; background: linear-gradient(145deg, #1e1e1e, #141414); border: 1px solid #333; color: #fff; border-radius: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .btn-plano-premium:hover { border-color: var(--primary-color); background: #1f1f1f; }
  .btn-plano-premium.destaque { border-color: var(--gold); }

  #qrcode-container { margin-top: 25px; background: #000; padding: 20px; border-radius: 16px; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #tela-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 99999; }
  .card-login { background: #1b1b1b; padding: 40px 30px; border-radius: 12px; border: 1px solid #333; width: 340px; text-align: center; }
  .card-login h2 { margin-bottom: 10px; color: #2e7d32; font-weight: 900; }
  
  header { padding:16px 20px; background:#1b1b1b; border-top:1px solid #2a2a2a; }
  #grade { white-space:pre-line; font-size:13px; color:#ddd; max-height:220px; overflow-y:auto; }
  .wrap { max-width:1200px; margin:0 auto; padding:20px; }
  .top { display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; justify-content:center; }

  #player, #ytplayer { width:500px; height:280px; background:#000 !important; border:1px solid #333; border-radius:8px; }
  #ytplayer { display:none; }
  .controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; background:#2f2f2f; color:#fff; }
  button:hover { background:#454545; }
  .btn-pri { background:#2e7d32; }
  .btn-admin { background:#6200ee; font-weight: bold; }
  
  .grid { display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; max-height:400px; overflow-y: auto !important; }
  .bloco { position:relative; flex:0 0 260px; border:1px solid #2b2b2b; background:#171717; border-radius:10px; padding:12px; }
  .running::before { content:"Em execução"; position:absolute; top:0; left:0; right:0; background:#2e7d32; color:#fff; font-size:12px; text-align:center; padding:2px 0; border-radius:10px 10px 0 0; }

  #letreiro-kbs-auto { position: absolute; top: 20px; left: 20px; z-index: 999; background: transparent; color: #ffd700; border-left: 5px solid #ffd700; padding: 10px 20px; font-weight: bold; font-size: 14px; display: none; align-items: center; gap: 10px; border-radius: 0 8px 8px 0; text-shadow: 2px 2px 4px #000; cursor: move; }
  #letreiro-logo-img { height: 25px; width: auto; display: none; pointer-events: none; }
  #banner-somente-logo { position: absolute; top: 60px; left: 20px; z-index: 1001; cursor: move; display: flex; align-items: center; justify-content: center; overflow: hidden; resize: both; width: 80px; height: 80px; }
  #img-banner-fixo { width: 100%; height: 100%; object-fit: contain; pointer-events: none; display: none; }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzzQg4fMWQm82aOu2xM2huVPvHeyitFxQ",
    authDomain: "controle-remoto-da345.firebaseapp.com",
    databaseURL: "https://controle-remoto-da345-default-rtdb.firebaseio.com",
    projectId: "controle-remoto-da345",
    storageBucket: "controle-remoto-da345.firebasestorage.app",
    messagingSenderId: "246457543992",
    appId: "1:246457543992:web:41bf1bd64a4788fb2625cd",
    measurementId: "G-CFHSFG82SX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.fazerLoginGoogle = () => {
    signInWithPopup(auth, provider).then((result) => {
        if (result && result.user) {
          document.getElementById('tela-login').style.display = 'none';
          const playerRef = ref(db, `usuarios/${result.user.uid}/player_m3u/0`);
          get(playerRef).then((snapshot) => {
            if (!snapshot.exists()) {
              set(playerRef, { dia: "segunda", inicio: "12:00", fim: "13:00", m3u: "https://srv4.zcast.com.br/samircalixto/samircalixto/playlist.m3u8", yt: "", timestamp: Date.now() });
            }
          });
        }
    });
  };

  window.ativarTeste7Dias = () => {
    const user = auth.currentUser;
    if (!user) return;
    const configRef = ref(db, `usuarios/${user.uid}/config`);
    get(configRef).then((snapshot) => {
      const config = snapshot.val() || {};
      if (config.testeUtilizado) return alert("Teste já utilizado.");
      set(configRef, { expiracao: Date.now() + (7 * 24 * 60 * 60 * 1000), testeUtilizado: true });
    });
  };

  window.fazerLogout = () => { signOut(auth).then(() => { location.reload(); }); };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('tela-login').style.display = 'none';
      onValue(ref(db, `usuarios/${user.uid}/config`), snap => {
        const config = snap.val() || { expiracao: 0 };
        if (config.expiracao < Date.now()) {
          document.getElementById('tela-pagamento').style.display = 'flex';
          document.getElementById('conteudo-player').style.display = 'none';
        } else {
          document.getElementById('tela-pagamento').style.display = 'none';
          document.getElementById('conteudo-player').style.display = 'block';
          iniciarLeituraFirebase(ref(db, `usuarios/${user.uid}/player_m3u`));
        }
      });
    } else {
      document.getElementById('tela-login').style.display = 'flex';
    }
  });

  window.gerarPix = async (valorPlano) => {
    const container = document.getElementById('qrcode-container');
    container.innerHTML = "<p>Gerando código PIX...</p>";
    try {
      const res = await fetch("https://kbs-backend-k3d0.onrender.com/gerar-pix", {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: auth.currentUser.email, uid: auth.currentUser.uid, valor: valorPlano })
      });
      const data = await res.json();
      if(data.qr_code_base64) {
        container.innerHTML = `<img src="data:image/png;base64,${data.qr_code_base64}" style="width:180px; background:white; padding:10px; border-radius:12px;"><button onclick="navigator.clipboard.writeText('${data.qr_code}')" style="margin-top:10px;">Copiar Código</button>`;
      }
    } catch (e) { alert("Erro servidor."); }
  };

  window.iniciarLeituraFirebase = function(referenciaDinamica) {
      onValue(referenciaDinamica, snap => {
          const dadosFirebase = snap.val() || {};
          let blocosManter = blocos.filter(b => b.tipo !== 'youtube' && !b._firebaseIndex);
          let novosBlocosAgendados = [];
          Object.keys(dadosFirebase).forEach(i => {
              const d = dadosFirebase[i];
              novosBlocosAgendados.push({ tipo: 'youtube', arquivos: [], progresso: [], tempo: 0, ytlink: d.yt || '', m3ulink: d.m3u || '', diaSemana: d.dia || '', horaInicio: d.inicio || '', horaFim: d.fim || '', removido: false, _firebaseIndex: i });
          });
          blocos = [...blocosManter, ...novosBlocosAgendados];
          blocosEl.innerHTML = '';
          blocos.forEach((b, i) => renderizarBloco(i, b));
      });
  };
</script>
</head>
<body>
  <div id="tela-pagamento"><div class="painel-premium"><h2>Acesso Expirado</h2><button class="btn-plano-premium" onclick="ativarTeste7Dias()">Ativar 7 Dias Grátis</button><button class="btn-plano-premium" onclick="gerarPix(29.90)">Mensal R$ 29,90</button><div id="qrcode-container"></div></div></div>
  <div id="tela-login"><div class="card-login"><h2>KBS TV</h2><button onclick="fazerLoginGoogle()">ENTRAR COM GMAIL</button></div></div>
  <div id="conteudo-player" style="display:none;">
    <div class="wrap">
      <video id="player" playsinline></video>
      <iframe id="ytplayer" allow="autoplay" frameborder="0"></iframe>
      <div class="controls">
        <button class="btn-pri" onclick="iniciar()">▶ Iniciar</button>
        <button onclick="pausar()">⏸ Pausar</button>
        <button onclick="proximoBloco()">⏭ Próximo</button>
      </div>
      <div id="blocos" class="grid"></div>
    </div>
  </div>
<script>
// Mantendo a lógica de player e arrasto original
const video = document.getElementById('player');
const ytplayer = document.getElementById('ytplayer');
let blocos = [], idxBloco = 0, sistemaIniciado = false, hlsInstance = null;

function tocarAtual() {
  const b = blocos[idxBloco];
  if (!b) return;
  ytplayer.style.display = 'none'; video.style.display = 'block';
  if (b.m3ulink) {
    if (Hls.isSupported()) {
        if (hlsInstance) hlsInstance.destroy();
        hlsInstance = new Hls();
        hlsInstance.loadSource(b.m3ulink);
        hlsInstance.attachMedia(video);
    }
  } else if (b.arquivos && b.arquivos.length > 0) {
      video.src = b.arquivos[b.arquivoAtual].url;
  }
  video.play().catch(()=>{});
}

function iniciar(){ sistemaIniciado = true; idxBloco=0; tocarAtual(); }
function proximoBloco(){ idxBloco=(idxBloco+1)%blocos.length; tocarAtual(); }
function pausar(){ video.pause(); }
</script>
</body>
</html>
